<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pragnya Ambekar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-deep: #0a2540;
      --blue-mid: #1a4480;
      --blue-bright: #2d7dd2;
      --blue-light: #e8f1fb;
      --blue-pale: #f4f8ff;
      --white: #ffffff;
      --text-muted: #5b7799;
    }

    html, body {
      min-height: 100%;
      background: var(--blue-pale);
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background:
        radial-gradient(ellipse at 20% 0%, #c8ddf7 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, #d6e8f9 0%, transparent 55%),
        var(--blue-pale);
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 2px 4px rgba(10,37,64,0.04),
        0 8px 24px rgba(10,37,64,0.08),
        0 32px 64px rgba(10,37,64,0.06);
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header stripe ── */
    .header {
      background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-mid) 60%, var(--blue-bright) 100%);
      padding: 2.4rem 2rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -20px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.1;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .name em {
      font-style: italic;
      color: rgba(255,255,255,0.7);
    }

    .tagline {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .badge-row {
      margin-top: 1.2rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.3rem 0.75rem;
      border-radius: 100px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(4px);
    }

    /* ── Links section ── */
    .links {
      padding: 1.6rem 1.5rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.1rem;
      border-radius: 14px;
      text-decoration: none;
      background: var(--blue-pale);
      border: 1.5px solid var(--blue-light);
      color: var(--blue-deep);
      transition: all 0.2s ease;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .link-btn:nth-child(1) { animation-delay: 0.08s; }
    .link-btn:nth-child(2) { animation-delay: 0.14s; }
    .link-btn:nth-child(3) { animation-delay: 0.20s; }
    .link-btn:nth-child(4) { animation-delay: 0.26s; }
    .link-btn:nth-child(5) { animation-delay: 0.32s; }
    .link-btn:nth-child(6) { animation-delay: 0.38s; }

    .link-btn:hover {
      background: var(--blue-light);
      border-color: var(--blue-bright);
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(45,125,210,0.14);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--blue-deep);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .link-label {
      flex: 1;
    }

    .link-label .l-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--blue-deep);
      line-height: 1.2;
    }

    .link-label .l-sub {
      font-size: 0.73rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .link-arrow {
      color: var(--blue-bright);
      font-size: 1.1rem;
      opacity: 0.5;
    }

    /* ── Footer ── */
    .footer {
      padding: 0 1.5rem 1.6rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .footer span {
      display: inline-block;
      width: 30px;
      height: 1px;
      background: var(--blue-light);
      vertical-align: middle;
      margin: 0 0.5rem;
    }
  </style>
</head>
